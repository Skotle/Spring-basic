<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>게시판 - irisen webapp</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/boardsheet.css">
</head>
<body>
<nav>
    <a class="nav-logo" href="/boards"><span>← 뒤로가기</span></a>
    <div class="nav-right">
        <span id="currentGid" class="status-badge online" style="font-family: var(--mono);"></span>
    </div>
</nav>

<main>
    <div class="boardContainer">
        <div class="boardBox" style="width: 100%; max-width: 800px; margin: 0 auto;">
            <div class="board-header">
                <span class="board-name" id="boardTitle">게시판 로딩 중...</span>
                <button class="btn btn-primary" onclick="location.href='#write'">글쓰기</button>
            </div>

            <div class="board-preview" id="postContainer">
            </div>

            <div class="pagination" style="margin-top: 1.5rem; text-align: center; display: flex; gap: 10px; justify-content: center;">
                <button class="btn btn-ghost" onclick="changePage(-1)">이전</button>
                <button class="btn btn-ghost" onclick="changePage(1)">다음</button>
            </div>
        </div>
    </div>
</main>

<script src="/js/common.js"></script>
<script src="/js/board.js"></script>
<script>
    const path = window.location.pathname.split('/');
    const gid = path[path.length - 1]; // URL에서 gid 추출
    let currentPage = 1;

    document.getElementById('currentGid').textContent = gid;
    document.getElementById('boardTitle').textContent = `${gid.toUpperCase()} Gallery`;

    function changePage(step) {
        if (currentPage + step < 1) return;
        currentPage += step;
        loadPosts(gid, currentPage);
    }

    window.onload = () => loadPosts(gid, currentPage);
</script>
</body>
</html>
