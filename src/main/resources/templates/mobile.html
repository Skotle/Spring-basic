<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
    <title>irisen mobile</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5128462008892004"
            crossorigin="anonymous"></script>
    <link rel="stylesheet" href="/css/mobile-app.css"/>
</head>
<body>
<section class="crawler-snapshot"
         aria-label="crawler loaded data"
         style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);clip-path:inset(50%);white-space:nowrap;">
    <h1>irisen mobile</h1>
    <nav aria-label="crawler mobile boards">
        <a th:each="board : ${crawlerBoards}"
           th:href="@{/m/board/{gid}(gid=${board.gall_id})}"
           th:attr="data-crawler-board-id=${board.gall_id},data-crawler-board-type=${board.gall_type},data-crawler-topic-id=${board.topic_id}"
           th:text="${board.gall_name != null ? board.gall_name : board.gall_id}">board</a>
    </nav>
    <section aria-label="crawler mobile recommended posts">
        <article th:each="post : ${crawlerPosts}"
                 th:attr="data-crawler-gid=${post.gall_id},data-crawler-post-no=${post.post_no},data-crawler-category=${post.category}">
            <a th:href="@{/m/board/{gid}/{postNo}(gid=${post.gall_id},postNo=${post.post_no})}"
               th:text="${post.title != null ? post.title : '제목 없음'}">post</a>
            <span th:text="${post.name != null ? post.name : ''}">author</span>
            <time th:text="${post.writed_at != null ? post.writed_at : post.created_at}">date</time>
        </article>
    </section>
</section>
<div id="mobile-app"></div>
<script src="/js/security-request.js"></script>
<script src="/webjars/react/18.2.0/umd/react.production.min.js"></script>
<script src="/webjars/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="/js/mobile-app.js"></script>
</body>
</html>
