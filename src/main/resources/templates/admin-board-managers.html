<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Board Managers Admin</title>
    <style>
        :root {
            --bg: #f5f6fa;
            --panel: #ffffff;
            --line: #e4e7ef;
            --text: #2f3640;
            --muted: #6b7280;
            --accent: #ff8fab;
            --accent-deep: #ff6680;
            --danger: #e74c3c;
            --ok: #2f9e44;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
        }

        .shell {
            max-width: 1240px;
            margin: 0 auto;
            padding: 24px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding: 14px 18px;
            border-radius: 12px;
            background: var(--accent);
            color: #fff;
            box-shadow: var(--shadow);
        }

        .topbar a {
            color: inherit;
            text-decoration: none;
            font-weight: 700;
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(0, 1.15fr) minmax(360px, 0.85fr);
            gap: 20px;
            margin-top: 20px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 16px;
            box-shadow: var(--shadow);
            padding: 20px;
        }

        h1, h2, h3, p { margin-top: 0; }

        .toolbar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .toolbar input,
        .field input,
        .field button,
        .toolbar button {
            font: inherit;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ccc;
            border-radius: 10px;
        }

        button {
            padding: 10px 14px;
            border: 1px solid transparent;
            border-radius: 10px;
            cursor: pointer;
        }

        .primary {
            background: var(--accent-deep);
            color: white;
        }

        .secondary {
            background: white;
            border-color: var(--line);
            color: var(--text);
        }

        .danger {
            background: #fff3f2;
            border-color: #f1b8b1;
            color: var(--danger);
        }

        .board-list {
            display: grid;
            gap: 12px;
            max-height: 70vh;
            overflow: auto;
        }

        .board-card {
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 14px;
            background: #fff;
            cursor: pointer;
        }

        .board-card.active {
            border-color: var(--accent);
            background: #fff6f9;
        }

        .meta {
            color: var(--muted);
            font-size: 0.92rem;
        }

        .stack {
            display: grid;
            gap: 12px;
        }

        .field {
            display: grid;
            gap: 8px;
        }

        .badge-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: #f7f8fc;
            font-size: 0.92rem;
        }

        .sub-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border: 1px solid var(--line);
            border-radius: 10px;
        }

        .hint, .feedback {
            font-size: 0.94rem;
        }

        .hint { color: var(--muted); }
        .feedback.ok { color: var(--ok); }
        .feedback.error { color: var(--danger); }

        .user-search {
            display: grid;
            gap: 8px;
        }

        .result-list {
            display: grid;
            gap: 8px;
            max-height: 220px;
            overflow: auto;
        }

        .result-item {
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 10px 12px;
            background: #fff;
        }

        @media (max-width: 960px) {
            .layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="shell">
    <div class="topbar">
        <a href="/">irisen admin</a>
        <span>
            <a href="/admin/requests">request center</a>
        </span>
    </div>

    <div class="layout">
        <section class="panel">
            <h1>보드 운영진 관리</h1>
            <p class="hint">매니저는 보드마다 정확히 한 명만 유지됩니다. 어드민은 즉시 교체할 수 있습니다.</p>
            <div class="toolbar">
                <input id="boardSearch" type="text" placeholder="보드 ID 또는 이름 검색">
                <button id="reloadBoards" class="secondary" type="button">새로고침</button>
            </div>
            <div id="boardList" class="board-list"></div>
        </section>

        <section class="panel">
            <h2 id="detailTitle">보드를 선택하세요</h2>
            <div id="detailBody" class="stack">
                <p class="hint">왼쪽 목록에서 보드를 선택하면 현재 매니저와 부매니저를 바로 관리할 수 있습니다.</p>
            </div>
        </section>
    </div>
</div>

<script src="/js/admin-board-managers.js"></script>
</body>
</html>
