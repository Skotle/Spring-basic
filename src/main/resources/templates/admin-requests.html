<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Requests</title>
    <style>
        :root {
            --bg: #f5f6fa;
            --panel: #ffffff;
            --line: #e4e7ef;
            --text: #2f3640;
            --muted: #6b7280;
            --accent: #ff8fab;
            --accent-deep: #ff6680;
            --danger: #e74c3c;
            --ok: #2f9e44;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
        }

        .shell {
            max-width: 1240px;
            margin: 0 auto;
            padding: 24px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding: 14px 18px;
            border-radius: 12px;
            background: var(--accent);
            color: #fff;
            box-shadow: var(--shadow);
        }

        .topbar a {
            color: inherit;
            text-decoration: none;
            font-weight: 700;
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 360px;
            gap: 20px;
            margin-top: 20px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 16px;
            box-shadow: var(--shadow);
            padding: 20px;
        }

        h1, h2, h3, p { margin-top: 0; }

        .tabs,
        .toolbar,
        .inline {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .tabs { margin-bottom: 16px; }

        button,
        input,
        select,
        textarea {
            font: inherit;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 11px 13px;
            border: 1px solid #cfd4df;
            border-radius: 10px;
            background: #fff;
        }

        textarea { resize: vertical; }

        button {
            padding: 10px 14px;
            border: 1px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            background: #fff;
        }

        .primary {
            background: var(--accent-deep);
            color: #fff;
        }

        .secondary {
            border-color: var(--line);
            color: var(--text);
        }

        .danger {
            background: #fff3f2;
            border-color: #f1b8b1;
            color: var(--danger);
        }

        .tab.active {
            border-color: var(--accent-deep);
            color: var(--accent-deep);
            font-weight: 700;
        }

        .request-list,
        .stack {
            display: grid;
            gap: 12px;
        }

        .request-card {
            display: grid;
            gap: 10px;
            border: 1px solid var(--line);
            border-radius: 14px;
            background: #fff;
            padding: 14px;
        }

        .request-card.pending {
            border-color: #ffd1dc;
            background: #fff8fb;
        }

        .request-head {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: flex-start;
        }

        .meta,
        .hint {
            color: var(--muted);
            font-size: 0.94rem;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 10px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: #f7f8fc;
            font-size: 0.88rem;
        }

        .badge.pending { color: var(--accent-deep); border-color: #ffd1dc; background: #fff8fb; }
        .badge.accepted { color: var(--ok); border-color: #bfe8ca; background: #f1fbf4; }
        .badge.rejected { color: var(--danger); border-color: #f1b8b1; background: #fff3f2; }

        .field {
            display: grid;
            gap: 7px;
        }

        .feedback {
            font-size: 0.94rem;
            padding: 10px 12px;
            border-radius: 10px;
        }

        .feedback.ok { color: var(--ok); background: #f1fbf4; }
        .feedback.error { color: var(--danger); background: #fff3f2; }

        .empty {
            border: 1px dashed var(--line);
            border-radius: 14px;
            padding: 24px;
            color: var(--muted);
            text-align: center;
            background: #fff;
        }

        @media (max-width: 960px) {
            .layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="shell">
    <div class="topbar">
        <a href="/">irisen admin</a>
        <div class="inline">
            <a href="/admin/boards">보드 운영진</a>
            <span>request center</span>
        </div>
    </div>

    <div class="layout">
        <main class="panel">
            <h1>관리자 요청 센터</h1>
            <p class="hint">관리자에게 도착한 요청을 처리하고, 매니저/부매니저 또는 사이드 보드 요청을 보낼 수 있습니다.</p>
            <div class="tabs">
                <button id="tabInbox" class="tab active secondary" type="button">받은 요청</button>
                <button id="tabSent" class="tab secondary" type="button">보낸 요청</button>
                <button id="reloadRequests" class="secondary" type="button">새로고침</button>
            </div>
            <div id="requestFeedback"></div>
            <section id="requestList" class="request-list"></section>
        </main>

        <aside class="panel stack">
            <h2>요청 보내기</h2>
            <section class="stack">
                <h3>운영진 요청</h3>
                <div class="field">
                    <label for="staffGallId">보드 ID</label>
                    <input id="staffGallId" type="text" placeholder="예: marine">
                </div>
                <div class="field">
                    <label for="staffTargetUid">대상 UID</label>
                    <input id="staffTargetUid" type="text" placeholder="요청을 받을 사용자 UID">
                </div>
                <div class="field">
                    <label for="staffRole">요청 권한</label>
                    <select id="staffRole">
                        <option value="manager">매니저</option>
                        <option value="submanager">부매니저</option>
                    </select>
                </div>
                <button id="sendStaffRequest" class="primary" type="button">운영진 요청 보내기</button>
            </section>

            <section class="stack">
                <h3>사이드 보드 요청</h3>
                <div class="field">
                    <label for="sideGallId">보드 ID</label>
                    <input id="sideGallId" type="text" placeholder="영문/숫자/_, -">
                </div>
                <div class="field">
                    <label for="sideGallName">보드 이름</label>
                    <input id="sideGallName" type="text" placeholder="표시 이름">
                </div>
                <div class="field">
                    <label for="sideReason">요청 사유</label>
                    <textarea id="sideReason" rows="4"></textarea>
                </div>
                <button id="sendSideRequest" class="primary" type="button">사이드 보드 요청 보내기</button>
            </section>
        </aside>
    </div>
</div>

<script src="/js/admin-requests.js"></script>
</body>
</html>
