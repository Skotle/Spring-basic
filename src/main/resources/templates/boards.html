<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>보드 목록 - irisen webapp</title>
  <link rel="stylesheet" href="/css/boardsheet.css">
</head>
<body>
<nav>
  <a class="nav-logo" href="/">
    <span class="dot"></span>
    <span>irisen webapp</span>
  </a>
  <div class="nav-right">
    <a class="btn btn-ghost" href="/">홈</a>
    <a class="btn btn-primary" href="/signin">로그인</a>
  </div>
</nav>

<main class="page-shell section-shell">
  <section class="panel">
    <div class="eyebrow">BOARD DIRECTORY</div>
    <h1 class="title-md" style="margin-top: 14px;">커뮤니티 보드</h1>
    <p class="body-copy" style="margin-top: 12px;">원래 보드 목록 기능은 유지하고, 검색과 빠른 진입용 UI를 추가했습니다.</p>

    <div class="search-row">
      <input id="boardSearchInput" type="text" placeholder="보드 ID 또는 이름 검색" oninput="filterBoards(this.value)">
      <a class="btn btn-ghost" href="/boards">초기화</a>
    </div>
  </section>

  <section id="boardList" class="board-grid">
  </section>
</main>

<script src="/js/common.js"></script>
<script src="/js/board.js"></script>
<script>
  loadBoardList();
</script>
</body>
</html>
