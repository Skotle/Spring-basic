<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>로그인</title>
  <link rel="stylesheet" href="/css/app.css">
  <link rel="stylesheet" href="/css/global.css">
</head>
<body>
<header class="topbar">
  <div class="frame">
    <div class="topbar-inner">
      <a class="brand" href="/">
        <span class="brand-mark"></span>
        <span>irisen web</span>
      </a>
      <div class="nav-actions">
        <a class="btn btn-ghost" href="/">홈</a>
        <a class="btn btn-primary" href="/nid">회원가입</a>
      </div>
    </div>
  </div>
</header>

<div class="page">
  <div class="card">
    <div class="eyebrow">LOGIN</div>
    <h1 class="title-md" style="margin-top: 14px;">로그인</h1>

    <div class="form">
      <div id="errorMsg" class="error-msg"></div>
      <div class="field">
        <label for="uid">아이디 또는 이메일</label>
        <input id="uid" type="text" placeholder="아이디 입력" autocomplete="username"/>
      </div>
      <div class="field">
        <label for="pw">비밀번호</label>
        <input id="pw" type="password" placeholder="비밀번호 입력" autocomplete="current-password"/>
      </div>
      <button class="btn btn-primary" id="loginBtn" type="button" onclick="doLogin()">
        <span class="btn-label">로그인</span>
        <span class="spinner"></span>
      </button>
    </div>
  </div>
</div>

<script src="/js/common.js"></script>
<script src="/js/login.js"></script>
<script src="/js/address.js"></script>
</body>
</html>
