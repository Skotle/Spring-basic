<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>로그인</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<header class="topbar">
  <div class="frame">
    <div class="topbar-inner">
      <div class="topbar-main">
        <a class="brand" href="/">
          <span class="brand-mark">/</span>
          <span>Irisen</span>
        </a>
        <form class="topbar-search" action="/search" method="get">
          <button type="button" class="topbar-menu" aria-label="메뉴"><span></span><span></span><span></span></button>
          <input class="topbar-search-input" type="search" name="q" placeholder="보드 & 게시글 검색">
          <button class="topbar-search-submit" type="submit" aria-label="검색"><span class="topbar-search-icon" aria-hidden="true"></span></button>
        </form>
        <div class="topbar-account">
          <a class="btn btn-primary btn-compact" href="/nid">회원가입</a>
        </div>
      </div>
      <nav class="topbar-nav" aria-label="주요 메뉴">
        <a href="/">홈</a>
        <a href="/boards?type=main">보드</a>
        <a href="/boards?type=side">사이드 보드</a>
        <span class="topbar-nav-divider" aria-hidden="true">||</span>
        <a href="/feed">피드</a>
        <a class="is-active topbar-nav-auth" href="/signin">로그인</a>
      </nav>
    </div>
  </div>
</header>

<div class="page">
  <div class="card">
    <div class="eyebrow">LOGIN</div>
    <h1 class="title-md" style="margin-top: 14px;">로그인</h1>

    <div class="form">
      <div id="errorMsg" class="error-msg"></div>
      <div class="field">
        <label for="uid">아이디 또는 이메일</label>
        <input id="uid" type="text" placeholder="아이디 입력" autocomplete="username"/>
      </div>
      <div class="field">
        <label for="pw">비밀번호</label>
        <input id="pw" type="password" placeholder="비밀번호 입력" autocomplete="current-password"/>
      </div>
      <button class="btn btn-primary" id="loginBtn" type="button" onclick="doLogin()">
        <span class="btn-label">로그인</span>
        <span class="spinner"></span>
      </button>
    </div>
  </div>
</div>

<script src="/js/security-request.js"></script>
<script src="/js/common.js"></script>
<script src="/js/recent-boards.js"></script>
<script src="/js/login.js"></script>
<script src="/js/address.js"></script>
</body>
</html>
