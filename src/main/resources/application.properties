spring.application.name=Spring_04
server.port=8080

# 기존 SQLite 설정 주석 처리 또는 삭제
# spring.datasource.url=jdbc:sqlite:mydb.db
# spring.datasource.driver-class-name=org.sqlite.JDBC

# GCP MySQL 설정 추가
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}
#--enable-native-access=ALL-UNNAMED
spring.datasource.hikari.maximum-pool-size=10 

# 아래 추가
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.encoding.force-request=true
server.servlet.encoding.force-response=true

spring.devtools.restart.enabled=false

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.ssl.checkserveridentity=false
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB

server.tomcat.max-swallow-size=55MB
server.tomcat.max-http-form-post-size=2MB

app.gcs.bucket-name=${APP_GCS_BUCKET_NAME:}
app.gcs.public-base-url=${APP_GCS_PUBLIC_BASE_URL:https://storage.googleapis.com}
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}
server.servlet.session.timeout=30m
server.forward-headers-strategy=framework
app.security.trusted-proxies=${APP_SECURITY_TRUSTED_PROXIES:127.0.0.1,::1}
app.security.admin-login-code=${APP_ADMIN_LOGIN_CODE:}
app.security.admin-allowed-addresses=${APP_ADMIN_ALLOWED_ADDRESSES:127.0.0.1,::1}
app.security.blocked-addresses=${APP_SECURITY_BLOCKED_ADDRESSES:103.215.75.221}
app.security.ip-location.enabled=${APP_SECURITY_IP_LOCATION_ENABLED:true}
app.security.ip-location.endpoint=${APP_SECURITY_IP_LOCATION_ENDPOINT:https://ipwho.is/{ip}?fields=success,country,region,city,ip}
app.security.ip-location.timeout-ms=${APP_SECURITY_IP_LOCATION_TIMEOUT_MS:1200}
app.security.ip-location.cache-hours=${APP_SECURITY_IP_LOCATION_CACHE_HOURS:6}


logging.level.org.apache.coyote.http11.Http11Processor=ERROR
logging.level.org.apache.tomcat.util.net.NioEndpoint=ERROR

# 로그 파일 저장 위치
logging.file.name=logs/server.log

# 로그 레벨
logging.level.root=INFO

# 콘솔 출력 형식
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# 파일 출력 형식
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

